<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع الآمن</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f1f5f9;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  color: #1e3a8a;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: #16a34a;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.paybox {
  background: #f8fafc;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>💳 الدفع الآمن</h2>

<p>المبلغ: <b>90€</b></p>

<div class="paybox">

<h3>معلومات الدفع</h3>

<label>الاسم على البطاقة</label>
<input type="text" required>

<label>رقم البطاقة</label>
<input type="text" placeholder="**** **** **** ****" required>

<label>تاريخ الانتهاء</label>
<input type="text" placeholder="MM/YY" required>

<label>CVV</label>
<input type="text" required>

</div>

<button class="btn" onclick="payNow()">
إتمام الدفع
</button>

</div>

<script>
function payNow() {
  alert("⚠ هذا نموذج فقط. لعمل دفع حقيقي نربطه بـ Stripe أو PayPal");
  window.location.href = "success.html";
}
</script>

</body>
</html>
